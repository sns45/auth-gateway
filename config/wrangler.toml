# Reference deployment: in8.sh. The gateway itself is domain-agnostic; to run
# your own, copy the template at the repo root (wrangler.toml), point the
# route/vars at your zone, and set the secrets listed below. Nothing in src/
# knows about in8.sh: cookie domain and frontend origin are derived from the
# request hostname (override with COOKIE_DOMAIN / FRONTEND_URL).
name = "in8-auth-gateway"
main = "../dist/index.js"
compatibility_date = "2024-10-21"
compatibility_flags = ["nodejs_compat"]

# Single KV namespace shared across all environments
[[kv_namespaces]]
binding = "AUTH_STORE"
id = "3557a29a2c894326bd3422bfb9ae4e51"
preview_id = "8c6d2c8b5d8f4e5486976b98d6765b1a"

# Production variables. The GOOGLE_CLIENT_ID is a public identifier by design
# (it appears in every OAuth redirect); secrets stay in Doppler / wrangler
# secrets: JWT_SECRET, SESSION_SECRET, GOOGLE_CLIENT_SECRET, CONVEX_DEPLOY_KEY,
# CONVEX_SYNC_SECRET.
[vars]
NODE_ENV = "production"
CONVEX_URL = "https://terrific-cormorant-458.convex.cloud"
CONVEX_SITE_URL = "https://terrific-cormorant-458.convex.site"
ALLOWED_ORIGINS = "https://in8.sh,https://www.in8.sh,https://auth.in8.sh"
LOG_LEVEL = "info"
GOOGLE_CLIENT_ID = "428616692025-tmncbvvk4k6lob3q185el3dv88v0i0j8.apps.googleusercontent.com"
OAUTH_BASE_URL = "https://auth.in8.sh"
FRONTEND_URL = "https://in8.sh"

# Custom domain route on the in8.sh zone
[[routes]]
pattern = "auth.in8.sh/*"
zone_name = "in8.sh"
